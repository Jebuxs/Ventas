<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Catálogo y Promociones</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://widget.cloudinary.com/v2.0/global/all.js" type="text/javascript"></script>
</head>
<body class="bg-gray-100 font-sans">

    <nav class="bg-indigo-900 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wider text-indigo-300">⚙️ GESTOR DE CATÁLOGO</h1>
            <div class="flex gap-4">
                <a href="index.html" class="bg-indigo-800 hover:bg-indigo-700 px-4 py-2 rounded text-sm transition">Ver Tienda Pública</a>
                <a href="admin.html" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded text-sm transition">Ir a Pedidos</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 grid grid-cols-1 lg:grid-cols-3 gap-6">
        <section class="bg-white p-6 rounded-xl shadow-md h-fit border border-gray-200">
            <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">Subir Calzado y Promociones</h2>
            <form id="form-catalogo" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Nombre del Modelo</label>
                    <input type="text" id="nombre" required class="mt-1 block w-full p-2.5 border rounded-md shadow-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Precio de Venta ($)</label>
                    <input type="number" id="precio" step="0.01" required class="mt-1 block w-full p-2.5 border rounded-md shadow-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Etiqueta de Promoción (Opcional)</label>
                    <select id="promocion" class="mt-1 block w-full p-2.5 border rounded-md bg-white shadow-sm">
                        <option value="">Sin promoción especial</option>
                        <option value="🔥 ¡2 X 1!">¡2 X 1!</option>
                        <option value="⚡ 20% DESCUENTO">20% Descuento</option>
                        <option value="✨ NUEVO MODELO">Nuevo Modelo</option>
                        <option value="📦 ENVÍO GRATIS">Envío Gratis</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Fotografía del Calzado</label>
                    <button type="button" id="btn-cloudinary" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-4 rounded-lg shadow transition flex items-center justify-center gap-2">
                        📸 Seleccionar o Tomar Foto
                    </button>
                    <div id="wrapper-preview" class="mt-3 hidden text-center">
                        <img id="img-preview" src="" class="mx-auto h-32 w-32 object-cover rounded-lg border-2 border-green-400 shadow">
                        <p class="text-xs text-green-600 font-semibold mt-1">✓ Imagen lista para guardar</p>
                    </div>
                    <input type="hidden" id="url-imagen-final" required>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Notas Adicionales / Materiales</label>
                    <textarea id="descripcion" rows="3" placeholder="Ej. Cuero legítimo, ideal para asfalto..." class="mt-1 block w-full p-2.5 border rounded-md shadow-sm"></textarea>
                </div>

                <button type="submit" id="btn-guardar-todo" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-xl shadow transition opacity-50 cursor-not-allowed" disabled>
                    🚀 Publicar en Catálogo Local
                </button>
            </form>
        </section>

        <section class="lg:col-span-2 bg-white p-6 rounded-xl shadow-md overflow-x-auto border border-gray-200">
            <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">Control de Productos en Vitrina</h2>
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Zapato</th>
                        <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Promo</th>
                        <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Precio</th>
                        <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Acción</th>
                    </tr>
                </thead>
                <tbody id="tabla-catalogo" class="bg-white divide-y divide-gray-200 text-sm text-gray-700">
                    </tbody>
            </table>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyB2p4mFewLlKojEAAfMfNi76U9K3HiIiAo",
          authDomain: "ventas-dcc22.firebaseapp.com",
          projectId: "ventas-dcc22",
          storageBucket: "ventas-dcc22.firebasestorage.app",
          messagingSenderId: "789904237680",
          appId: "1:789904237680:web:45b32dd8e211193e1e40b5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // CONFIGURACIÓN ASIGNADA DE TU CAPTURA
        const CLOUD_NAME = "duyjyfunn";       
        const UPLOAD_PRESET = "zapatos_preset";   

        const btnCloudinary = document.getElementById('btn-cloudinary');
        const urlImagenFinal = document.getElementById('url-imagen-final');
        const wrapperPreview = document.getElementById('wrapper-preview');
        const imgPreview = document.getElementById('img-preview');
        const btnGuardarTodo = document.getElementById('btn-guardar-todo');

        const myWidget = cloudinary.createUploadWidget({
            cloudName: CLOUD_NAME, 
            uploadPreset: UPLOAD_PRESET,
            sources: ['local', 'camera', 'url'],
            multiple: false,
            clientAllowedFormats: ["png", "jpg", "jpeg", "webp"]
        }, (error, result) => { 
            if (!error && result && result.event === "success") { 
                const urlSegura = result.info.secure_url;
                urlImagenFinal.value = urlSegura;
                imgPreview.src = urlSegura;
                wrapperPreview.classList.remove('hidden');
                btnGuardarTodo.disabled = false;
                btnGuardarTodo.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        });

        btnCloudinary.addEventListener('click', () => myWidget.open(), false);

        const formCatalogo = document.getElementById('form-catalogo');
        const tablaCatalogo = document.getElementById('tabla-catalogo');

        onSnapshot(collection(db, "calzado"), (snapshot) => {
            tablaCatalogo.innerHTML = '';
            snapshot.forEach((doc) => {
                const prod = doc.data();
                const id = doc.id;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="px-4 py-3 whitespace-nowrap">
                        <div class="flex items-center">
                            <img class="h-10 w-10 rounded-lg object-cover mr-2 border shadow-sm" src="${prod.imagen}">
                            <div class="font-bold text-gray-900">${prod.nombre}</div>
                        </div>
                    </td>
                    <td class="px-4 py-3 whitespace-nowrap">
                        <span class="px-2 py-0.5 text-xs rounded font-bold ${prod.promocion ? 'bg-red-100 text-red-700' : 'bg-gray-100 text-gray-400'}">
                            ${prod.promocion || 'Ninguna'}
                        </span>
                    </td>
                    <td class="px-4 py-3 whitespace-nowrap font-bold text-indigo-700">$${parseFloat(prod.precio).toFixed(2)}</td>
                    <td class="px-4 py-3 whitespace-nowrap">
                        <button onclick="eliminarDelCatatogo('${id}')" class="text-red-500 hover:text-red-700 font-medium">Bajar</button>
                    </td>
                `;
                tablaCatalogo.appendChild(tr);
            });
        });

        formCatalogo.addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await addDoc(collection(db, "calzado"), {
                    nombre: document.getElementById('nombre').value,
                    precio: parseFloat(document.getElementById('precio').value),
                    promocion: document.getElementById('promocion').value,
                    imagen: urlImagenFinal.value,
                    descripcion: document.getElementById('descripcion').value
                });
                formCatalogo.reset();
                wrapperPreview.classList.add('hidden');
                btnGuardarTodo.disabled = true;
                btnGuardarTodo.classList.add('opacity-50', 'cursor-not-allowed');
                alert("¡Modelo publicado con éxito!");
            } catch (error) {
                console.error(error);
            }
        });

        window.eliminarDelCatatogo = async (id) => {
            if(confirm("¿Quitar de la vitrina?")) {
                await deleteDoc(doc(db, "calzado", id));
            }
        }
    </script>
</body>
</html>
