<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calzado Store - Vitrina Comercial</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">

    <nav class="bg-blue-600 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-wider">CALZADO STORE</h1>
            <div class="flex items-center gap-4">
                <div id="usuario-anonimo" class="block">
                    <a href="login.html" class="bg-blue-700 hover:bg-blue-800 px-4 py-2 rounded text-sm font-semibold transition">🛒 Ingresar / Crear Cuenta</a>
                </div>
                <div id="usuario-autenticado" class="hidden flex items-center gap-3">
                    <span id="email-usuario" class="text-sm font-medium bg-blue-700 px-3 py-1 rounded"></span>
                    <button onclick="cerrarSesion()" class="text-xs text-red-200 hover:text-white underline">Cerrar Sesión</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="bg-amber-500 text-white text-center py-2.5 px-4 text-sm font-bold shadow-inner">
        🔥 BENEFICIO EXCLUSIVO: ¡Mantenimiento gratis a los 3 meses y ajuste de costuras a los 4 meses! 🔥
    </div>

    <main class="container mx-auto p-4 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <section class="lg:col-span-2">
            <h2 class="text-xl font-bold text-gray-800 mb-4">Modelos en Exhibición</h2>
            <div id="contenedor-catalogo" class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                </div>
        </section>

        <section class="bg-white p-6 rounded-lg shadow-md h-fit sticky top-24">
            <h2 class="text-xl font-bold text-gray-800 mb-2">Tu Orden de Compra</h2>
            <p id="alerta-login-carrito" class="text-sm text-amber-600 font-medium mb-4 bg-amber-50 p-2 rounded border border-amber-200">
                ⚠️ Debes iniciar sesión para procesar y personalizar tu calzado.
            </p>
            
            <div id="contenido-carrito" class="space-y-4 max-h-80 overflow-y-auto mb-4">
                <p class="text-gray-500 text-center text-sm">No has agregado ningún modelo.</p>
            </div>
            
            <div class="border-t pt-4">
                <div class="flex justify-between items-center text-lg font-bold text-gray-900 mb-4">
                    <span>Total:</span>
                    <span id="total-precio">$0.00</span>
                </div>
                <button onclick="procesarPedidoBaseDatos()" id="btn-confirmar-pedido" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded-lg transition opacity-50 cursor-not-allowed" disabled>
                    Confirmar Pedido de Fábrica
                </button>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyB2p4mFewLlKojEAAfMfNi76U9K3HiIiAo",
          authDomain: "ventas-dcc22.firebaseapp.com",
          projectId: "ventas-dcc22",
          storageBucket: "ventas-dcc22.firebasestorage.app",
          messagingSenderId: "789904237680",
          appId: "1:789904237680:web:45b32dd8e211193e1e40b5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let productosDisponibles = [];
        let carrito = [];
        let usuarioActual = null;

        // --- OBSERVAR ESTADO DEL CLIENTE ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                usuarioActual = user;
                document.getElementById('usuario-anonimo').classList.add('hidden');
                document.getElementById('usuario-autenticado').classList.remove('hidden');
                document.getElementById('email-usuario').innerText = user.email;
                document.getElementById('alerta-login-carrito').classList.add('hidden');
            } else {
                usuarioActual = null;
                document.getElementById('usuario-anonimo').classList.remove('hidden');
                document.getElementById('usuario-autenticado').classList.add('hidden');
                document.getElementById('alerta-login-carrito').classList.remove('hidden');
            }
            actualizarInterfazCarrito();
        });

        window.cerrarSesion = () => signOut(auth).then(() => window.location.reload());

        // --- LEER VITRINA (Gestionada desde catalogo.html) ---
        const contenedorCatalogo = document.getElementById('contenedor-catalogo');

        onSnapshot(collection(db, "calzado"), (snapshot) => {
            contenedorCatalogo.innerHTML = '';
            productosDisponibles = [];
            
            if(snapshot.empty) {
                contenedorCatalogo.innerHTML = '<p class="text-gray-500 col-span-2 text-center py-8">No hay modelos cargados en el catálogo en este momento.</p>';
                return;
            }

            snapshot.forEach(doc => {
                const prod = { id: doc.id, ...doc.data() };
                productosDisponibles.push(prod);
                
                const div = document.createElement('div');
                div.className = "bg-white rounded-xl shadow-md overflow-hidden border border-gray-100 p-4 flex flex-col justify-between";
                div.innerHTML = `
                    <img src="${prod.imagen}" class="w-full h-48 object-cover rounded-lg mb-3">
                    <div>
                        <div class="flex justify-between items-start mb-1">
                            <h3 class="font-bold text-lg text-gray-900">${prod.nombre}</h3>
                            ${prod.promocion ? `<span class="bg-red-500 text-white text-xs px-2.5 py-0.5 rounded-full font-bold">${prod.promocion}</span>` : ''}
                        </div>
                        <p class="text-xs text-gray-500 mb-3">${prod.descripcion || ''}</p>
                        
                        <div class="bg-blue-50 p-2 rounded-lg space-y-1 text-[11px] text-blue-800 mb-4 font-medium">
                            <div>🎁 Mantenimiento preventivo gratis (Mes 3)</div>
                            <div>🧵 Ajuste de costuras gratis (Mes 4)</div>
                            <div>👟 Suela a mitad de precio (Ciclo medio)</div>
                        </div>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-xl font-extrabold text-blue-600">$${parseFloat(prod.precio).toFixed(2)}</span>
                        <button onclick="agregarAlCarrito('${prod.id}')" class="bg-blue-600 hover:bg-blue-700 text-white text-xs px-3 py-2 rounded-lg font-bold transition">
                            Añadir al Carrito
                        </button>
                    </div>
                `;
                contenedorCatalogo.appendChild(div);
            });
        });

        // --- MANEJO DEL CARRITO (TALLAS Y COLORES) ---
        window.agregarAlCarrito = (id) => {
            const prod = productosDisponibles.find(p => p.id === id);
            carrito.push({
                id: prod.id,
                nombre: prod.nombre,
                precio: prod.precio,
                talla: "38", 
                color: "Negro", 
                cantidad: 1
            });
            actualizarInterfazCarrito();
        };

        function actualizarInterfazCarrito() {
            const contenido = document.getElementById('contenido-carrito');
            const totalTxt = document.getElementById('total-precio');
            const btnConfirmar = document.getElementById('btn-confirmar-pedido');
            
            contenido.innerHTML = '';
            if(carrito.length === 0) {
                contenido.innerHTML = '<p class="text-gray-500 text-center text-sm">El carrito está vacío.</p>';
                totalTxt.innerText = "$0.00";
                btnConfirmar.disabled = true;
                btnConfirmar.classList.add('opacity-50', 'cursor-not-allowed');
                return;
            }

            let total = 0;
            carrito.forEach((item, index) => {
                total += item.precio * item.cantidad;
                const div = document.createElement('div');
                div.className = "bg-gray-50 p-3 rounded-lg border flex flex-col gap-2 text-xs text-gray-700";
                div.innerHTML = `
                    <div class="flex justify-between items-center font-bold text-gray-900">
                        <span>${item.nombre}</span>
                        <button onclick="removerDelCarrito(${index})" class="text-red-500 font-bold text-base">&times;</button>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-[10px] uppercase font-bold text-gray-400">Talla:</label>
                            <select onchange="cambiarEspecificacion(${index}, 'talla', this.value)" class="w-full bg-white p-1 border rounded">
                                <option value="36">36</option><option value="37">37</option>
                                <option value="38" selected>38</option><option value="39">39</option>
                                <option value="40">40</option><option value="41">41</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] uppercase font-bold text-gray-400">Color:</label>
                            <select onchange="cambiarEspecificacion(${index}, 'color', this.value)" class="w-full bg-white p-1 border rounded">
                                <option value="Negro" selected>Negro</option>
                                <option value="Blanco">Blanco</option>
                                <option value="Café">Café</option>
                                <option value="Azul">Azul</option>
                            </select>
                        </div>
                    </div>
                    <div class="flex justify-between items-center pt-1 border-t mt-1">
                        <span>Precio: $${parseFloat(item.precio).toFixed(2)}</span>
                    </div>
                `;
                contenido.appendChild(div);
            });

            totalTxt.innerText = `$${total.toFixed(2)}`;
            
            if (usuarioActual) {
                btnConfirmar.disabled = false;
                btnConfirmar.classList.remove('opacity-50', 'cursor-not-allowed');
            } else {
                btnConfirmar.disabled = true;
                btnConfirmar.classList.add('opacity-50', 'cursor-not-allowed');
            }
        }

        window.cambiarEspecificacion = (index, propiedad, valor) => { carrito[index][propiedad] = valor; };
        window.removerDelCarrito = (index) => { carrito.splice(index, 1); actualizarInterfazCarrito(); };

        // --- ENVIAR ORDEN A FIRESTORE ---
        window.procesarPedidoBaseDatos = async () => {
            if(!usuarioActual) return;
            try {
                await addDoc(collection(db, "pedidos"), {
                    clienteEmail: usuarioActual.email,
                    articulos: carrito,
                    fecha: new Date().toLocaleString(),
                    estado: "Pendiente"
                });
                alert("¡Pedido guardado con éxito! Se ha mandado a tu panel de administración.");
                carrito = [];
                actualizarInterfazCarrito();
            } catch (err) {
                alert("Error al procesar la compra: " + err.message);
            }
        };
    </script>
</body>
</html>
