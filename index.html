<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda de Calzado - Catálogo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">

    <nav class="bg-blue-600 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-wider">CALZADO STORE</h1>
            <a href="admin.html" class="bg-blue-700 hover:bg-blue-800 px-4 py-2 rounded text-sm transition">Panel Admin</a>
        </div>
    </nav>

    <main class="container mx-auto p-4 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <section class="lg:col-span-2">
            <h2 class="text-xl font-bold text-gray-800 mb-4">Nuestro Calzado</h2>
            <div id="contenedor-catalogo" class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                </div>
        </section>

        <section class="bg-white p-6 rounded-lg shadow-md h-fit sticky top-20">
            <h2 class="text-xl font-bold text-gray-800 mb-4">Tu Pedido</h2>
            <div id="contenido-carrito" class="space-y-4 max-h-96 overflow-y-auto mb-4">
                <p class="text-gray-500 text-center">El carrito está vacío.</p>
            </div>
            
            <div class="border-t pt-4">
                <div class="flex justify-between items-center text-lg font-bold text-gray-900 mb-4">
                    <span>Total:</span>
                    <span id="total-precio">$0.00</span>
                </div>
                <button onclick="enviarAWhatsApp()" id="btn-whatsapp" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded-lg flex items-center justify-center gap-2 transition opacity-50 cursor-not-allowed" disabled>
                    Enviar Pedido por WhatsApp
                </button>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        // Tus credenciales oficiales aplicadas
        const firebaseConfig = {
          apiKey: "AIzaSyB2p4mFewLlKojEAAfMfNi76U9K3HiIiAo",
          authDomain: "ventas-dcc22.firebaseapp.com",
          projectId: "ventas-dcc22",
          storageBucket: "ventas-dcc22.firebasestorage.app",
          messagingSenderId: "789904237680",
          appId: "1:789904237680:web:45b32dd8e211193e1e40b5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let productosDisponibles = [];
        let carrito = [];

        const contenedorCatalogo = document.getElementById('contenedor-catalogo');
        const contenidoCarrito = document.getElementById('contenido-carrito');
        const totalPrecio = document.getElementById('total-precio');
        const btnWhatsapp = document.getElementById('btn-whatsapp');

        // Escucha activa de Firestore
        onSnapshot(collection(db, "calzado"), (snapshot) => {
            productosDisponibles = [];
            contenedorCatalogo.innerHTML = '';
            
            if(snapshot.empty) {
                contenedorCatalogo.innerHTML = '<p class="text-gray-500">No hay calzado disponible por el momento.</p>';
                return;
            }

            snapshot.forEach((doc) => {
                const producto = { id: doc.id, ...doc.data() };
                productosDisponibles.push(producto);
                renderizarTarjeta(producto);
            });
        });

        function renderizarTarjeta(producto) {
            const div = document.createElement('div');
            div.className = "bg-white rounded-lg shadow overflow-hidden flex flex-col justify-between border border-gray-100";
            div.innerHTML = `
                <img src="${producto.imagen || 'https://via.placeholder.com/150'}" alt="${producto.nombre}" class="w-full h-48 object-cover">
                <div class="p-4 flex-grow flex flex-col justify-between">
                    <div>
                        <h3 class="font-bold text-lg text-gray-900 mb-1">${producto.nombre}</h3>
                        <p class="text-gray-600 text-sm mb-2">${producto.descripcion || ''}</p>
                    </div>
                    <div class="flex items-center justify-between mt-4">
                        <span class="text-xl font-extrabold text-blue-600">$${parseFloat(producto.precio).toFixed(2)}</span>
                        <button class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded text-sm font-semibold transition btn-agregar" data-id="${producto.id}">
                            Agregar
                        </button>
                    </div>
                </div>
            `;
            div.querySelector('.btn-agregar').addEventListener('click', () => agregarAlCarrito(producto.id));
            contenedorCatalogo.appendChild(div);
        }

        function agregarAlCarrito(id) {
            const producto = productosDisponibles.find(p => p.id === id);
            const itemEnCarrito = carrito.find(item => item.id === id);
            if (itemEnCarrito) {
                itemEnCarrito.cantidad++;
            } else {
                carrito.push({ ...producto, cantidad: 1 });
            }
            actualizarCarrito();
        }

        function actualizarCarrito() {
            contenidoCarrito.innerHTML = '';
            if (carrito.length === 0) {
                contenidoCarrito.innerHTML = '<p class="text-gray-500 text-center">El carrito está vacío.</p>';
                totalPrecio.innerText = '$0.00';
                btnWhatsapp.disabled = true;
                btnWhatsapp.classList.add('opacity-50', 'cursor-not-allowed');
                return;
            }

            let total = 0;
            carrito.forEach(item => {
                const subtotal = item.precio * item.cantidad;
                total += subtotal;
                const div = document.createElement('div');
                div.className = "flex justify-between items-center bg-gray-50 p-2 rounded border border-gray-200";
                div.innerHTML = `
                    <div class="max-w-[60%]">
                        <h4 class="font-bold text-sm text-gray-800 truncate">${item.nombre}</h4>
                        <span class="text-xs text-gray-500">$${parseFloat(item.precio).toFixed(2)} x ${item.cantidad}</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="font-bold text-sm text-gray-900">$${subtotal.toFixed(2)}</span>
                        <button class="text-red-500 hover:text-red-700 font-bold px-1 btn-remover" data-id="${item.id}">&times;</button>
                    </div>
                `;
                div.querySelector('.btn-remover').addEventListener('click', () => removerDelCarrito(item.id));
                contenidoCarrito.appendChild(div);
            });

            totalPrecio.innerText = `$${total.toFixed(2)}`;
            btnWhatsapp.disabled = false;
            btnWhatsapp.classList.remove('opacity-50', 'cursor-not-allowed');
        }

        function removerDelCarrito(id) {
            const index = carrito.findIndex(item => item.id === id);
            if (index !== -1) {
                if (carrito[index].cantidad > 1) {
                    carrito[index].cantidad--;
                } else {
                    carrito.splice(index, 1);
                }
            }
            actualizarCarrito();
        }

        window.enviarAWhatsApp = function() {
            const numeroTelefono = "593999999999"; // REEMPLAZA CON TU NÚMERO (Ej: 593 para Ecuador)
            let mensaje = "¡Hola! Me interesa realizar el siguiente pedido de calzado:\n\n";
            let total = 0;

            carrito.forEach(item => {
                const subtotal = item.precio * item.cantidad;
                total += subtotal;
                mensaje += `▪ *${item.nombre}* (Cant: ${item.cantidad}) - Subtotal: $${subtotal.toFixed(2)}\n`;
            });

            mensaje += `\n*Total a Pagar:* $${total.toFixed(2)}\n`;
            const mensajeCodificado = encodeURIComponent(mensaje);
            window.open(`https://api.whatsapp.com/send?phone=${numeroTelefono}&text=${mensajeCodificado}`, '_blank');
        };
    </script>
</body>
</html>
