<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Pedidos - Administrador Seguro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen">

    <div id="bloqueo-seguridad" class="fixed inset-0 bg-gray-950 flex items-center justify-center z-50">
        <div class="text-center">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-amber-500 mx-auto mb-4"></div>
            <p class="text-sm text-gray-400 font-medium">Validando credenciales de administrador...</p>
        </div>
    </div>

    <nav class="bg-gray-800 p-4 border-b border-gray-700 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wider text-amber-500">📥 PANEL DE PEDIDOS SOLICITADOS</h1>
            <div class="flex gap-4 items-center">
                <a href="../index.html" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded text-sm transition">Ver Tienda</a>
                <a href="catalogo.html" class="bg-indigo-700 hover:bg-indigo-600 px-4 py-2 rounded text-sm transition">Gestionar Vitrina</a>
                <button onclick="cerrarSesionAdmin()" class="bg-red-600 hover:bg-red-700 text-white text-xs px-3 py-2 rounded font-bold transition">Salir</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4">
        <h2 class="text-lg font-semibold mb-4 text-gray-400">Cola de Producción y Solicitudes Recientes</h2>
        
        <div class="overflow-x-auto bg-gray-800 rounded-xl shadow-lg border border-gray-700">
            <table class="min-w-full divide-y divide-gray-700 text-sm">
                <thead class="bg-gray-800">
                    <tr>
                        <th class="px-6 py-4 text-left font-semibold text-amber-400">Cliente (Email)</th>
                        <th class="px-6 py-4 text-left font-semibold text-amber-400">Detalle del Calzado / Talla / Color</th>
                        <th class="px-6 py-4 text-left font-semibold text-amber-400">Fecha</th>
                        <th class="px-6 py-4 text-left font-semibold text-amber-400">Estado</th>
                        <th class="px-6 py-4 text-left font-semibold text-amber-400">Acción</th>
                    </tr>
                </thead>
                <tbody id="lista-pedidos" class="divide-y divide-gray-700">
                    </tbody>
            </table>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyB2p4mFewLlKojEAAfMfNi76U9K3HiIiAo",
          authDomain: "ventas-dcc22.firebaseapp.com",
          projectId: "ventas-dcc22",
          storageBucket: "ventas-dcc22.firebasestorage.app",
          messagingSenderId: "789904237680",
          appId: "1:789904237680:web:45b32dd8e211193e1e40b5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- GUARDIÁN DE SEGURIDAD POR ROL ---
        const CORREO_ADMINISTRADOR = "jandry@admin.com"; // <<-- CAMBIA POR TU CORREO REAL

        onAuthStateChanged(auth, (user) => {
            if (!user || user.email !== CORREO_ADMINISTRADOR) {
                alert("⛔ ACCESO DENEGADO: No tienes permisos de administrador.");
                window.location.href = "../index.html"; // Expulsado a la raíz pública
            } else {
                // Si es el administrador legítimo, removemos la pantalla de bloqueo
                document.getElementById('bloqueo-seguridad').classList.add('hidden');
            }
        });

        window.cerrarSesionAdmin = () => {
            signOut(auth).then(() => window.location.href = "../index.html");
        };

        // --- CARGA EN TIEMPO REAL DE PEDIDOS ---
        const listaPedidos = document.getElementById('lista-pedidos');

        onSnapshot(collection(db, "pedidos"), (snapshot) => {
            listaPedidos.innerHTML = '';
            if(snapshot.empty) {
                listaPedidos.innerHTML = '<tr><td colspan="5" class="p-8 text-center text-gray-500">No hay pedidos pendientes en la base de datos.</td></tr>';
                return;
            }

            snapshot.forEach((documento) => {
                const pedido = documento.data();
                const id = documento.id;
                
                let detalleArticulos = '<ul class="space-y-1 list-disc list-inside text-gray-300">';
                pedido.articulos.forEach(art => {
                    detalleArticulos += `<li><strong>${art.nombre}</strong> - <span class="text-yellow-400 font-bold">Talla: ${art.talla}</span> | Color: ${art.color}</li>`;
                });
                detalleArticulos += '</ul>';

                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-750 transition duration-150";
                tr.innerHTML = `
                    <td class="px-6 py-4 font-medium text-gray-200 whitespace-nowrap">${pedido.clienteEmail}</td>
                    <td class="px-6 py-4">${detalleArticulos}</td>
                    <td class="px-6 py-4 text-gray-400 whitespace-nowrap">${pedido.fecha}</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-2.5 py-1 text-xs font-bold rounded-full ${pedido.estado === 'Pendiente' ? 'bg-amber-900 text-amber-300' : 'bg-green-900 text-green-300'}">
                            ${pedido.estado}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap flex gap-2">
                        ${pedido.estado === 'Pendiente' ? `<button class="bg-green-600 hover:bg-green-700 text-white text-xs px-2.5 py-1.5 rounded font-bold transition btn-listo">Listo</button>` : ''}
                        <button class="bg-red-600 hover:bg-red-700 text-white text-xs px-2.5 py-1.5 rounded font-bold transition btn-eliminar">❌</button>
                    </td>
                `;

                // Listeners seguros de acciones
                const btnListo = tr.querySelector('.btn-listo');
                if(btnListo) btnListo.addEventListener('click', () => marcarEntregado(id));
                tr.querySelector('.btn-eliminar').addEventListener('click', () => eliminarPedido(id));

                listaPedidos.appendChild(tr);
            });
        });

        async function marcarEntregado(id) {
            await updateDoc(doc(db, "pedidos", id), { estado: "Despachado" });
        }

        async function eliminarPedido(id) {
            if(confirm("¿Deseas eliminar este registro de pedido?")) {
                await deleteDoc(doc(db, "pedidos", id));
            }
        }
    </script>
</body>
</html>
