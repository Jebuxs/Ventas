<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Pedidos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">

    <div id="bloqueo-seguridad" class="fixed inset-0 bg-gray-950 flex items-center justify-center z-50">
        <div class="text-center">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-amber-500 mx-auto mb-4"></div>
            <p class="text-sm text-gray-400">Verificando nivel de rol en base de datos...</p>
        </div>
    </div>

    <nav class="bg-gray-800 p-4 border-b border-gray-700 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-amber-500">📥 PANEL DE PEDIDOS</h1>
            <div class="flex gap-4 items-center">
                <a href="../index.html" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded text-sm">Ver Tienda</a>
                <a href="catalogo.html" class="bg-indigo-700 hover:bg-indigo-600 px-4 py-2 rounded text-sm">Gestionar Vitrina</a>
                <button onclick="cerrarSesionAdmin()" class="bg-red-600 text-xs px-3 py-2 rounded font-bold">Salir</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4">
        <div class="overflow-x-auto bg-gray-800 rounded-xl border border-gray-700 mt-4">
            <table class="min-w-full divide-y divide-gray-700 text-sm">
                <thead class="bg-gray-800">
                    <tr>
                        <th class="px-6 py-4 text-left text-amber-400">Cliente</th>
                        <th class="px-6 py-4 text-left text-amber-400">Detalle / Talla / Color</th>
                        <th class="px-6 py-4 text-left text-amber-400">Fecha</th>
                        <th class="px-6 py-4 text-left text-amber-400">Estado</th>
                        <th class="px-6 py-4 text-left text-amber-400">Acción</th>
                    </tr>
                </thead>
                <tbody id="lista-pedidos" class="divide-y divide-gray-700"></tbody>
            </table>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, getDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyB2p4mFewLlKojEAAfMfNi76U9K3HiIiAo",
          authDomain: "ventas-dcc22.firebaseapp.com",
          projectId: "ventas-dcc22",
          storageBucket: "ventas-dcc22.firebasestorage.app",
          messagingSenderId: "789904237680",
          appId: "1:789904237680:web:45b32dd8e211193e1e40b5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- CONTROLADOR DE ACCESO POR BASE DE DATOS ---
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "../login.html";
                return;
            }
            const docRef = doc(db, "usuarios_registrados", user.uid);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists() && docSnap.data().rol === "admin") {
                document.getElementById('bloqueo-seguridad').classList.add('hidden'); // Permitido
            } else {
                alert("⛔ ACCESO RECHAZADO: No eres administrador en la Base de Datos.");
                window.location.href = "../index.html"; // Expulsado
            }
        });

        window.cerrarSesionAdmin = () => { signOut(auth).then(() => window.location.href = "../login.html"); };

        // Carga de Pedidos en tiempo real
        const listaPedidos = document.getElementById('lista-pedidos');
        onSnapshot(collection(db, "pedidos"), (snapshot) => {
            listaPedidos.innerHTML = '';
            snapshot.forEach((documento) => {
                const pedido = documento.data();
                const id = documento.id;
                let detalle = '<ul>';
                pedido.articulos.forEach(art => { detalle += `<li>${art.nombre} - Talla: ${art.talla} | Color: ${art.color}</li>`; });
                detalle += '</ul>';

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="px-6 py-4">${pedido.clienteEmail}</td>
                    <td class="px-6 py-4">${detalle}</td>
                    <td class="px-6 py-4">${pedido.fecha}</td>
                    <td class="px-6 py-4">${pedido.estado}</td>
                    <td class="px-6 py-4"><button onclick="eliminarPedido('${id}')">❌</button></td>
                `;
                listaPedidos.appendChild(tr);
            });
        });
    </script>
</body>
</html>
