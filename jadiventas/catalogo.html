<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Catálogo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://widget.cloudinary.com/v2.0/global/all.js" type="text/javascript"></script>
</head>
<body class="bg-gray-100">

    <div id="bloqueo-seguridad" class="fixed inset-0 bg-gray-950 flex items-center justify-center z-50">
        <div class="text-center">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-indigo-500 mx-auto mb-4"></div>
            <p class="text-sm text-gray-400">Verificando nivel de rol en base de datos...</p>
        </div>
    </div>

    <nav class="bg-indigo-900 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-indigo-300">⚙️ GESTOR DE CATÁLOGO</h1>
            <div class="flex gap-4 items-center">
                <a href="../index.html" class="bg-indigo-800 hover:bg-indigo-700 px-4 py-2 rounded text-sm">Ver Tienda</a>
                <a href="admin.html" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded text-sm">Ir a Pedidos</a>
                <button onclick="cerrarSesionAdmin()" class="bg-red-600 text-xs px-3 py-2 rounded font-bold">Salir</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 grid grid-cols-1 lg:grid-cols-3 gap-6">
        <section class="bg-white p-6 rounded-xl border">
            <form id="form-catalogo" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Nombre del Modelo</label>
                    <input type="text" id="nombre" required class="mt-1 block w-full p-2 border rounded text-gray-900">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Precio de Venta ($)</label>
                    <input type="number" id="precio" step="0.01" required class="mt-1 block w-full p-2 border rounded text-gray-900">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Fotografía</label>
                    <button type="button" id="btn-cloudinary" class="w-full bg-indigo-600 text-white py-2 rounded font-semibold">📸 Subir Foto</button>
                    <input type="hidden" id="url-imagen-final" required>
                </div>
                <button type="submit" id="btn-guardar-todo" class="w-full bg-green-600 text-white py-3 rounded font-bold opacity-50 cursor-not-allowed" disabled>Publicar Calzado</button>
            </form>
        </section>
        <section class="lg:col-span-2 bg-white p-6 rounded-xl border">
            <table class="min-w-full divide-y divide-gray-200">
                <tbody id="tabla-catalogo"></tbody>
            </table>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyB2p4mFewLlKojEAAfMfNi76U9K3HiIiAo",
          authDomain: "ventas-dcc22.firebaseapp.com",
          projectId: "ventas-dcc22",
          storageBucket: "ventas-dcc22.firebasestorage.app",
          messagingSenderId: "789904237680",
          appId: "1:789904237680:web:45b32dd8e211193e1e40b5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- VERIFICACIÓN DE ROL POR BASE DE DATOS ---
        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = "../login.html"; return; }
            const docRef = doc(db, "usuarios_registrados", user.uid);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists() && docSnap.data().rol === "admin") {
                document.getElementById('bloqueo-seguridad').classList.add('hidden');
            } else {
                alert("⛔ ACCESO RECHAZADO.");
                window.location.href = "../index.html";
            }
        });

        window.cerrarSesionAdmin = () => { signOut(auth).then(() => window.location.href = "../login.html"); };

        // Lógica de Cloudinary
        const CLOUD_NAME = "duyjyfunn";       
        const UPLOAD_PRESET = "zapatos_preset";   
        const myWidget = cloudinary.createUploadWidget({ cloudName: CLOUD_NAME, uploadPreset: UPLOAD_PRESET, multiple: false }, (error, result) => { 
            if (!error && result && result.event === "success") { 
                document.getElementById('url-imagen-final').value = result.info.secure_url;
                document.getElementById('btn-guardar-todo').disabled = false;
                document.getElementById('btn-guardar-todo').classList.remove('opacity-50', 'cursor-not-allowed');
            }
        });
        document.getElementById('btn-cloudinary').addEventListener('click', () => myWidget.open(), false);

        // Formulario Guardar Calzado
        document.getElementById('form-catalogo').addEventListener('submit', async (e) => {
            e.preventDefault();
            await addDoc(collection(db, "calzado"), {
                nombre: document.getElementById('nombre').value,
                precio: parseFloat(document.getElementById('precio').value),
                imagen: document.getElementById('url-imagen-final').value
            });
            document.getElementById('form-catalogo').reset();
            alert("¡Publicado!");
        });
    </script>
</body>
</html>
