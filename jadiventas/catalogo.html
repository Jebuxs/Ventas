<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Catálogo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://widget.cloudinary.com/v2.0/global/all.js" type="text/javascript"></script>
</head>
<body class="bg-gray-100">

    <div id="bloqueo-seguridad" class="fixed inset-0 bg-gray-950 flex items-center justify-center z-50">
        <div class="text-center p-6 bg-gray-900 rounded-xl shadow-xl max-w-sm mx-4">
            <div id="loader-seguridad" class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-indigo-500 mx-auto mb-4"></div>
            <p id="texto-seguridad" class="text-sm text-gray-300 font-medium">Verificando nivel de rol en la base de datos...</p>
            <div id="btn-error-container" class="hidden mt-4">
                <button onclick="cerrarSesionAdmin()" class="bg-red-600 hover:bg-red-700 text-white text-xs px-4 py-2 rounded-lg font-bold transition">
                    Volver al Login / Salir
                </button>
            </div>
        </div>
    </div>

    <nav class="bg-indigo-900 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-indigo-300">⚙️ GESTOR DE CATÁLOGO</h1>
            <div class="flex gap-4 items-center">
                <a href="../index.html" class="bg-indigo-800 hover:bg-indigo-700 px-4 py-2 rounded text-sm">Ver Tienda</a>
                <a href="admin.html" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded text-sm">Ir a Pedidos</a>
                <button onclick="cerrarSesionAdmin()" class="bg-red-600 hover:bg-red-500 text-xs px-3 py-2 rounded font-bold transition">Salir</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <section class="bg-white p-6 rounded-xl border shadow-sm">
            <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">Agregar Nuevo Calzado</h2>
            <form id="form-catalogo" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Nombre del Modelo</label>
                    <input type="text" id="nombre" required class="mt-1 block w-full p-2 border rounded text-gray-900 bg-gray-50 focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Precio de Venta ($)</label>
                    <input type="number" id="precio" step="0.01" required class="mt-1 block w-full p-2 border rounded text-gray-900 bg-gray-50 focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Fotografía del Producto</label>
                    <button type="button" id="btn-cloudinary" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2 px-4 rounded font-semibold shadow transition duration-200">
                        📸 Subir Foto (Galería o Cámara)
                    </button>
                    <input type="hidden" id="url-imagen-final" required>
                </div>
                
                <button type="submit" id="btn-guardar-todo" class="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded font-bold shadow-md transition duration-200 opacity-50 cursor-not-allowed" disabled>
                    Publicar Calzado
                </button>
            </form>
        </section>

        <section class="lg:col-span-2 bg-white p-6 rounded-xl border shadow-sm">
            <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">Modelos Publicados Actuales</h2>
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200 text-sm">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-4 py-3 text-left font-semibold text-gray-600">Imagen</th>
                            <th class="px-4 py-3 text-left font-semibold text-gray-600">Modelo</th>
                            <th class="px-4 py-3 text-left font-semibold text-gray-600">Precio</th>
                            <th class="px-4 py-3 text-center font-semibold text-gray-600">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-catalogo" class="divide-y divide-gray-200 text-gray-700"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyB2p4mFewLlKojEAAfMfNi76U9K3HiIiAo",
          authDomain: "ventas-dcc22.firebaseapp.com",
          projectId: "ventas-dcc22",
          storageBucket: "ventas-dcc22.firebasestorage.app",
          messagingSenderId: "789904237680",
          appId: "1:789904237680:web:45b32dd8e211193e1e40b5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const bloqueoSeguridad = document.getElementById('bloqueo-seguridad');
        const loaderSeguridad = document.getElementById('loader-seguridad');
        const textoSeguridad = document.getElementById('texto-seguridad');
        const btnErrorContainer = document.getElementById('btn-error-container');

        // ====================================================
        // CONTROLES DE ACCESO CON BYPASS DE EMERGENCIA POR EMAIL
        // ====================================================
        onAuthStateChanged(auth, async (user) => {
            if (!user) { 
                window.location.href = "../login.html"; 
                return; 
            }
            
            try {
                const docRef = doc(db, "usuarios_registrados", user.uid);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists() && docSnap.data().rol === "admin") {
                    // Si en Firebase eres admin, pasas directo
                    bloqueoSeguridad.classList.add('hidden');
                } else {
                    // BLINDAJE: Si Firestore falla pero iniciaste con tu correo admin, te deja pasar
                    if (user.email.toLowerCase() === "villjebuxs@gmail.com") {
                        console.log("Bypass activado: Acceso concedido por Correo Propietario.");
                        bloqueoSeguridad.classList.add('hidden');
                    } else {
                        const rolActual = docSnap.exists() ? docSnap.data().rol : "Ninguno";
                        manejarAccesoDenegado(`ACCESO RECHAZADO: Rango "${rolActual}" insuficiente.`);
                    }
                }
            } catch (error) {
                // En caso de error de red, si eres el dueño pasas de todas formas
                if (user.email.toLowerCase() === "villjebuxs@gmail.com") {
                    bloqueoSeguridad.classList.add('hidden');
                } else {
                    manejarAccesoDenegado("Error de base de datos: " + error.message);
                }
            }
        });

        function manejarAccesoDenegado(mensaje) {
            loaderSeguridad.classList.add('hidden');
            textoSeguridad.innerHTML = `<span class="text-red-400 font-bold">⛔ ${mensaje}</span><br><br><span class="text-xs text-gray-400">Si eres el administrador, inicia sesión con el correo villjebuxs@gmail.com</span>`;
            btnErrorContainer.classList.remove('hidden');
        }

        window.cerrarSesionAdmin = () => { 
            signOut(auth).then(() => window.location.href = "../login.html"); 
        };

        // ====================================================
        // CONFIGURACIÓN DE CLOUDINARY CORREGIDA Y VERSÁTIL
        // ====================================================
        const CLOUD_NAME = "duyjyfunn";       
        const UPLOAD_PRESET = "zapatos_preset";   

        const myWidget = cloudinary.createUploadWidget({ 
            cloudName: CLOUD_NAME, 
            uploadPreset: UPLOAD_PRESET, 
            multiple: false,
            sources: ['local', 'camera'], // Abre galería en celulares y evita bloqueos de cámara
            language: "es",
            styles: {
                palette: {
                    window: "#1F2937",
                    sourceBg: "#111827",
                    windowBorder: "#4F46E5",
                    tabIcon: "#FFFFFF",
                    inactiveTabIcon: "#9CA3AF",
                    menuIcons: "#FFFFFF",
                    textDark: "#000000",
                    textLight: "#FFFFFF",
                    link: "#6366F1",
                    action: "#10B981",
                    complete: "#10B981",
                    error: "#EF4444"
                }
            }
        }, (error, result) => { 
            if (!error && result && result.event === "success") { 
                document.getElementById('url-imagen-final').value = result.info.secure_url;
                
                const btnGuardar = document.getElementById('btn-guardar-todo');
                btnGuardar.disabled = false;
                btnGuardar.classList.remove('opacity-50', 'cursor-not-allowed');
                
                alert("¡Imagen procesada y cargada con éxito!");
            }
        });

        document.getElementById('btn-cloudinary').addEventListener('click', () => myWidget.open(), false);

        // ====================================================
        // GUARDAR MODELO EN FIRESTORE
        // ====================================================
        document.getElementById('form-catalogo').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nombreZapato = document.getElementById('nombre').value;
            const precioZapato = parseFloat(document.getElementById('precio').value);
            const imagenZapato = document.getElementById('url-imagen-final').value;

            try {
                await addDoc(collection(db, "calzado"), {
                    nombre: nombreZapato,
                    precio: precioZapato,
                    imagen: imagenZapato,
                    fechaRegistro: new Date().toLocaleDateString()
                });
                
                document.getElementById('form-catalogo').reset();
                const btnGuardar = document.getElementById('btn-guardar-todo');
                btnGuardar.disabled = true;
                btnGuardar.classList.add('opacity-50', 'cursor-not-allowed');
                
                alert("¡Modelo de calzado publicado con éxito!");
            } catch (err) {
                alert("Error al guardar: " + err.message);
            }
        });

        // ====================================================
        // CARGA EN TIEMPO REAL DEL CATÁLOGO
        // ====================================================
        const tablaCatalogo = document.getElementById('tabla-catalogo');
        
        onSnapshot(collection(db, "calzado"), (snapshot) => {
            tablaCatalogo.innerHTML = ''; 
            snapshot.forEach((documento) => {
                const calzado = documento.data();
                const id = documento.id;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="px-4 py-3">
                        <img src="${calzado.imagen}" alt="${calzado.nombre}" class="w-12 h-12 object-cover rounded-lg shadow-sm border">
                    </td>
                    <td class="px-4 py-3 font-medium text-gray-900">${calzado.nombre}</td>
                    <td class="px-4 py-3 text-green-600 font-semibold">$${calzado.precio.toFixed(2)}</td>
                    <td class="px-4 py-3 text-center">
                        <button onclick="eliminarCalzado('${id}')" class="text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100 p-2 rounded-lg transition">
                            🗑️ Eliminar
                        </button>
                    </td>
                `;
                tablaCatalogo.appendChild(tr);
            });
        });

        window.eliminarCalzado = async (id) => {
            if (confirm("¿Seguro que deseas eliminar este calzado?")) {
                try {
                    await deleteDoc(doc(db, "calzado", id));
                    alert("Producto retirado.");
                } catch (err) {
                    alert("Error: " + err.message);
                }
            }
        };
    </script>
</body>
</html>
