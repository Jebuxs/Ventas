<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Seguro - Calzado Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 flex items-center justify-center min-h-screen font-sans px-4">

    <div id="contenedor-login" class="bg-white p-8 rounded-2xl shadow-2xl max-w-md w-full block">
        <h2 id="auth-titulo" class="text-2xl font-bold text-gray-800 text-center mb-1">¡Te damos la bienvenida!</h2>
        <p id="auth-subtitulo" class="text-xs text-gray-500 text-center mb-6">Activa tu cuenta para registrar tus mantenimientos y garantías.</p>

        <button type="button" id="btn-google" class="w-full flex items-center justify-center gap-3 bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-semibold py-3 px-4 rounded-xl transition shadow-sm mb-6">
            <svg class="w-5 h-5" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Continuar con Google
        </button>

        <div class="flex items-center my-4">
            <div class="flex-1 border-t border-gray-200"></div>
            <span class="mx-4 text-xs text-gray-400 uppercase tracking-wider font-semibold">o usar correo</span>
            <div class="flex-1 border-t border-gray-200"></div>
        </div>

        <form id="form-auth" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Correo Electrónico</label>
                <input type="email" id="auth-email" placeholder="ejemplo@correo.com" required class="mt-1 block w-full p-3 border rounded-xl text-gray-950 focus:ring-blue-500 focus:border-blue-500 shadow-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Contraseña</label>
                <input type="password" id="auth-password" placeholder="••••••" required class="mt-1 block w-full p-3 border rounded-xl text-gray-950 focus:ring-blue-500 focus:border-blue-500 shadow-sm">
            </div>
            
            <div id="wrapper-whatsapp-registro" class="hidden">
                <label class="block text-sm font-medium text-amber-600 font-bold">Número de WhatsApp (Obligatorio)</label>
                <input type="tel" id="auth-whatsapp-registro" placeholder="Ej: +593999999999" class="mt-1 block w-full p-3 border border-amber-300 rounded-xl text-gray-950 focus:ring-blue-500 focus:border-blue-500 shadow-sm bg-amber-50">
            </div>

            <button type="submit" id="btn-auth-submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition shadow-lg">
                Ingresar con Correo
            </button>
        </form>

        <div class="mt-6 text-center text-sm border-t pt-4">
            <button onclick="alternarModoAuth()" id="btn-cambiar-modo" class="text-blue-600 hover:underline font-medium">
                ¿No tienes cuenta? Regístrate aquí
            </button>
        </div>
        <div class="text-center mt-3">
            <a href="index.html" class="text-xs text-gray-400 hover:text-gray-600 underline">Volver al catálogo público</a>
        </div>
    </div>

    <div id="modal-whatsapp" class="bg-white p-8 rounded-2xl shadow-2xl max-w-md w-full hidden text-center animate-fade-in">
        <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-10 h-10 text-green-500" fill="currentColor" viewBox="0 0 24 24">
                <path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397 0 11.966 0c3.178.001 6.169 1.24 8.419 3.496 2.25 2.256 3.489 5.252 3.488 8.434-.004 6.619-5.34 11.967-11.91 11.967-1.992-.001-3.952-.5-5.688-1.453L0 24zm6.59-4.846c1.656.983 3.511 1.501 5.397 1.502 5.613 0 10.181-4.576 10.185-10.19.002-2.721-1.056-5.279-2.981-7.21C17.317 1.32 14.773.26 12.056.26c-5.62 0-10.19 4.577-10.194 10.192-.001 1.884.499 3.73 1.446 5.36L2.38 21.61l5.859-1.534.408.242z"/>
            </svg>
        </div>
        <h3 class="text-xl font-bold text-gray-900 mb-2">¡Paso muy Importante!</h3>
        <p class="text-sm text-gray-600 mb-6">Para poder activar tus <span class="font-bold text-blue-600">Mantenimientos Gratuitos</span> y coberturas de garantía, introduce tu número de WhatsApp de contacto.</p>
        
        <form id="form-whatsapp-confirmar" class="space-y-4">
            <input type="tel" id="input-whatsapp-modal" placeholder="Ej: +593999999999" required class="block w-full p-3 border border-gray-300 rounded-xl text-center text-lg tracking-wider text-gray-950 font-semibold focus:ring-green-500 focus:border-green-500">
            <button type="submit" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-xl transition shadow-lg">
                Activar Mis Garantías
            </button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyB2p4mFewLlKojEAAfMfNi76U9K3HiIiAo",
          authDomain: "ventas-dcc22.firebaseapp.com",
          projectId: "ventas-dcc22",
          storageBucket: "ventas-dcc22.firebasestorage.app",
          messagingSenderId: "789904237680",
          appId: "1:789904237680:web:45b32dd8e211193e1e40b5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        const CORREO_ADMINISTRADOR = "villjebuxs@gmail.com"; 
        let esModoRegistro = false;
        let datosUsuarioTemporal = null; // Almacena el usuario de Google temporalmente mientras pone el WhatsApp

        // --- VALIDAR ROL Y REDIRECCIONAR ---
        function redireccionarPorRol(email) {
            if (email.toLowerCase() === CORREO_ADMINISTRADOR.toLowerCase()) {
                window.location.href = "jadiventas/admin.html";
            } else {
                window.location.href = "index.html";
            }
        }

        // --- VERIFICAR O CREAR EXPEDIENTE DEL CLIENTE ---
        async function procesarIngresoCliente(user, nombrePorDefecto, whatsappManual = null) {
            if (user.email.toLowerCase() === CORREO_ADMINISTRADOR.toLowerCase()) {
                redireccionarPorRol(user.email);
                return;
            }

            const docRef = doc(db, "usuarios_registrados", user.uid);
            const docSnap = await getDoc(docRef);

            if (!docSnap.exists()) {
                // Si el usuario no existe y no tenemos el WhatsApp aún, guardamos sus datos y abrimos el modal
                if (!whatsappManual) {
                    datosUsuarioTemporal = user;
                    document.getElementById('contenedor-login').classList.add('hidden');
                    document.getElementById('modal-whatsapp').classList.remove('hidden');
                    return; // Pausamos el flujo hasta que llene el modal
                }

                // Si ya tenemos el WhatsApp, creamos la hoja de vida técnica completa
                await setDoc(docRef, {
                    clienteEmail: user.email,
                    nombre: user.displayName || nombrePorDefecto,
                    whatsapp: whatsappManual,
                    fechaRegistro: new Date().toLocaleDateString(),
                    garantiasYPostventa: {
                        mantenimientoMes3: "Disponible",
                        ajusteCosturasMes4: "Disponible",
                        cambioSuelaPromocion: "Disponible"
                    }
                });
            } else {
                // Si ya existía el usuario en la base de datos pero por algún motivo no tenía WhatsApp, se lo pedimos
                const datosExistentes = docSnap.data();
                if (!datosExistentes.whatsapp && !whatsappManual) {
                    datosUsuarioTemporal = user;
                    document.getElementById('contenedor-login').classList.add('hidden');
                    document.getElementById('modal-whatsapp').classList.remove('hidden');
                    return;
                }
            }
            
            redireccionarPorRol(user.email);
        }

        // --- ESCUCHA DEL FORMULARIO DEL MODAL (WHATSAPP PARA GOOGLE) ---
        document.getElementById('form-whatsapp-confirmar').addEventListener('submit', async (e) => {
            e.preventDefault();
            const whatsappIngresado = document.getElementById('input-whatsapp-modal').value.trim();
            
            if (datosUsuarioTemporal) {
                await procesarIngresoCliente(datosUsuarioTemporal, "Cliente Google", whatsappIngresado);
                alert("¡WhatsApp guardado y beneficios activados!");
            }
        });

        // --- INICIAR SESIÓN CON GOOGLE ---
        document.getElementById('btn-google').addEventListener('click', async () => {
            try {
                const resultado = await signInWithPopup(auth, googleProvider);
                await procesarIngresoCliente(resultado.user, resultado.user.displayName);
            } catch (err) {
                alert("Error al conectar con Google: " + err.message);
            }
        });

        // --- ACCESO Y REGISTRO CON CORREO TRADICIONAL ---
        document.getElementById('form-auth').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value.trim();
            const pass = document.getElementById('auth-password').value;

            try {
                if (esModoRegistro) {
                    const whatsappRegistro = document.getElementById('auth-whatsapp-registro').value.trim();
                    if(!whatsappRegistro) {
                        alert("Por favor ingresa tu número de WhatsApp para el registro.");
                        return;
                    }
                    const credenciales = await createUserWithEmailAndPassword(auth, email, pass);
                    await procesarIngresoCliente(credenciales.user, "Cliente Registro Correo", whatsappRegistro);
                    alert("¡Cuenta de cliente y ficha de mantenimiento activadas!");
                } else {
                    const userCredential = await signInWithEmailAndPassword(auth, email, pass);
                    await procesarIngresoCliente(userCredential.user, "Cliente");
                }
            } catch (err) {
                alert("Error en las credenciales: " + err.message);
            }
        });

        window.alternarModoAuth = () => {
            esModoRegistro = !esModoRegistro;
            document.getElementById('auth-titulo').innerText = esModoRegistro ? "Crear Cuenta de Cliente" : "¡Te damos la bienvenida!";
            document.getElementById('auth-subtitulo').innerText = esModoRegistro ? "Regístrate para asegurar tu cobertura de mantenimientos gratis." : "Activa tu cuenta para registrar tus mantenimientos y garantías.";
            document.getElementById('btn-auth-submit').innerText = esModoRegistro ? "Registrarme y Activar Beneficios" : "Ingresar con Correo";
            document.getElementById('wrapper-whatsapp-registro').classList.toggle('hidden', !esModoRegistro);
            document.getElementById('auth-whatsapp-registro').required = esModoRegistro;
            document.getElementById('btn-cambiar-modo').innerText = esModoRegistro ? "¿Ya tienes una cuenta? Inicia sesión aquí" : "¿No tienes cuenta? Regístrate aquí";
        };
    </script>
</body>
</html>
