<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jadi - Acceso al Ecosistema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        .bg-jadi-dark { background-color: #0f172a; }
        .text-jadi-gold { color: #fbbf24; }
        .border-jadi-gold { border-color: #fbbf24; }
        .focus-ring-jadi:focus { ring-color: #fbbf24; }
        .bg-jadi-gold { background-color: #fbbf24; }
        .bg-jadi-gold:hover { background-color: #f59e0b; }
    </style>
</head>
<body class="bg-jadi-dark flex items-center justify-center min-h-screen font-sans px-4">

    <div id="contenedor-login" class="bg-gray-900 p-8 rounded-2xl shadow-2xl max-w-md w-full border border-gray-700">
        <!-- Logo Jadi -->
        <div class="text-center mb-6">
            <div class="flex justify-center items-center gap-2">
                <i class="fas fa-crown text-jadi-gold text-3xl"></i>
                <h1 class="text-3xl font-extrabold text-white tracking-wider">JADI</h1>
            </div>
            <p class="text-xs text-gray-400 mt-1">Ecosistema de Outfit</p>
        </div>

        <h2 id="auth-titulo" class="text-2xl font-bold text-white text-center mb-1">¡Bienvenido!</h2>
        <p id="auth-subtitulo" class="text-sm text-gray-400 text-center mb-6">Inicia sesión para gestionar tus compras y garantías</p>

        <!-- Botón Google -->
        <button type="button" id="btn-google" class="w-full flex items-center justify-center gap-3 bg-white hover:bg-gray-100 text-gray-800 font-semibold py-3 px-4 rounded-xl transition shadow-md mb-4 border border-gray-300">
            <i class="fab fa-google text-xl"></i>
            Continuar con Google
        </button>

        <div class="flex items-center my-4">
            <div class="flex-1 border-t border-gray-600"></div>
            <span class="mx-4 text-xs text-gray-500 uppercase tracking-wider font-semibold">o usa tu correo</span>
            <div class="flex-1 border-t border-gray-600"></div>
        </div>

        <!-- Formulario -->
        <form id="form-auth" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-300">Correo Electrónico</label>
                <input type="email" id="auth-email" placeholder="ejemplo@correo.com" required class="mt-1 block w-full p-3 bg-gray-800 border border-gray-600 rounded-xl text-white placeholder-gray-400 focus:ring-2 focus:ring-jadi-gold focus:border-transparent outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300">Contraseña</label>
                <input type="password" id="auth-password" placeholder="••••••" required class="mt-1 block w-full p-3 bg-gray-800 border border-gray-600 rounded-xl text-white placeholder-gray-400 focus:ring-2 focus:ring-jadi-gold focus:border-transparent outline-none">
            </div>
            
            <!-- Campo WhatsApp (solo en registro) -->
            <div id="wrapper-whatsapp-registro" class="hidden">
                <label class="block text-sm font-medium text-jadi-gold">
                    <i class="fab fa-whatsapp mr-1"></i> WhatsApp (Obligatorio)
                </label>
                <input type="tel" id="auth-whatsapp-registro" placeholder="+593 99 999 9999" class="mt-1 block w-full p-3 bg-gray-800 border border-jadi-gold/50 rounded-xl text-white placeholder-gray-400 focus:ring-2 focus:ring-jadi-gold outline-none">
                <p class="text-[10px] text-gray-500 mt-1">Usaremos este número para coordinar garantías y envíos.</p>
            </div>

            <button type="submit" id="btn-auth-submit" class="w-full bg-jadi-gold hover:bg-yellow-400 text-black font-bold py-3 rounded-xl transition shadow-lg">
                Ingresar con Correo
            </button>
        </form>

        <div class="mt-6 text-center text-sm border-t border-gray-700 pt-4">
            <button onclick="alternarModoAuth()" id="btn-cambiar-modo" class="text-jadi-gold hover:underline font-medium">
                ¿No tienes cuenta? Regístrate aquí
            </button>
        </div>
    </div>

    <!-- Modal WhatsApp (para usuarios que se registran con Google) -->
    <div id="modal-whatsapp" class="bg-gray-900 p-8 rounded-2xl shadow-2xl max-w-md w-full hidden text-center border border-gray-700">
        <h3 class="text-xl font-bold text-white mb-2"><i class="fab fa-whatsapp text-green-500"></i> Casi listo</h3>
        <p class="text-sm text-gray-400 mb-6">Para activar tu garantía Jadi, necesitamos tu número de WhatsApp.</p>
        <form id="form-whatsapp-confirmar" class="space-y-4">
            <input type="tel" id="input-whatsapp-modal" placeholder="+593 99 999 9999" required class="block w-full p-3 bg-gray-800 border border-gray-600 rounded-xl text-white text-center text-lg font-semibold focus:ring-2 focus:ring-jadi-gold outline-none">
            <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl transition shadow-lg">
                <i class="fas fa-check-circle mr-2"></i> Completar Registro
            </button>
        </form>
    </div>

    <!-- ==================== SCRIPTS ==================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB2p4mFewLlKojEAAfMfNi76U9K3HiIiAo",
            authDomain: "ventas-dcc22.firebaseapp.com",
            projectId: "ventas-dcc22",
            storageBucket: "ventas-dcc22.firebasestorage.app",
            messagingSenderId: "789904237680",
            appId: "1:789904237680:web:45b32dd8e211193e1e40b5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        let esModoRegistro = false;
        let datosUsuarioTemporal = null;

        // --- Verificar rol y redirigir ---
        async function evaluarRolYRedireccionar(uid) {
            const docRef = doc(db, "usuarios_registrados", uid);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const datos = docSnap.data();
                if (datos.rol === "admin") {
                    window.location.href = "jadiventas/admin.html";
                } else {
                    window.location.href = "index.html";
                }
            } else {
                window.location.href = "index.html";
            }
        }

        // --- Procesar usuario (registro o login) ---
        async function procesarUsuario(user, nombreDefecto, whatsappManual = null) {
            const docRef = doc(db, "usuarios_registrados", user.uid);
            const docSnap = await getDoc(docRef);

            if (!docSnap.exists()) {
                if (!whatsappManual) {
                    datosUsuarioTemporal = user;
                    document.getElementById('contenedor-login').classList.add('hidden');
                    document.getElementById('modal-whatsapp').classList.remove('hidden');
                    return;
                }

                // Registro nuevo: siempre cliente por defecto
                await setDoc(docRef, {
                    clienteEmail: user.email,
                    nombre: user.displayName || nombreDefecto || "Cliente Jadi",
                    whatsapp: whatsappManual,
                    rol: "cliente",
                    fechaRegistro: new Date().toLocaleDateString(),
                    garantias: { mantenimientoMes3: "Disponible", ajusteCosturasMes4: "Disponible" }
                });
            }
            
            await evaluarRolYRedireccionar(user.uid);
        }

        // --- Modal WhatsApp ---
        document.getElementById('form-whatsapp-confirmar').addEventListener('submit', async (e) => {
            e.preventDefault();
            const wa = document.getElementById('input-whatsapp-modal').value.trim();
            if (datosUsuarioTemporal) {
                await procesarUsuario(datosUsuarioTemporal, "Cliente Google", wa);
            }
        });

        // --- Google ---
        document.getElementById('btn-google').addEventListener('click', async () => {
            try {
                const res = await signInWithPopup(auth, googleProvider);
                await procesarUsuario(res.user, res.user.displayName);
            } catch (err) {
                alert("Error con Google: " + err.message);
            }
        });

        // --- Formulario tradicional ---
        document.getElementById('form-auth').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value.trim();
            const pass = document.getElementById('auth-password').value;

            try {
                if (esModoRegistro) {
                    const wa = document.getElementById('auth-whatsapp-registro').value.trim();
                    if (!wa) {
                        alert("Por favor, ingresa tu número de WhatsApp para la garantía.");
                        return;
                    }
                    const cred = await createUserWithEmailAndPassword(auth, email, pass);
                    await procesarUsuario(cred.user, "Cliente Correo", wa);
                } else {
                    const cred = await signInWithEmailAndPassword(auth, email, pass);
                    await evaluarRolYRedireccionar(cred.user.uid);
                }
            } catch (err) {
                alert("Error: " + err.message);
            }
        });

        // --- Alternar modo registro/login ---
        window.alternarModoAuth = () => {
            esModoRegistro = !esModoRegistro;
            document.getElementById('auth-titulo').innerText = esModoRegistro ? "Crear Cuenta Jadi" : "¡Bienvenido!";
            document.getElementById('btn-auth-submit').innerText = esModoRegistro ? "Registrarme" : "Ingresar con Correo";
            document.getElementById('wrapper-whatsapp-registro').classList.toggle('hidden', !esModoRegistro);
            document.getElementById('auth-whatsapp-registro').required = esModoRegistro;
            document.getElementById('btn-cambiar-modo').innerText = esModoRegistro ? "¿Ya tienes cuenta? Inicia sesión" : "¿No tienes cuenta? Regístrate aquí";
        };
    </script>
</body>
</html>
