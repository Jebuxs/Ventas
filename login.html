<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Calzado Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 flex items-center justify-center min-h-screen font-sans px-4">

    <div id="contenedor-login" class="bg-white p-8 rounded-2xl shadow-2xl max-w-md w-full">
        <h2 id="auth-titulo" class="text-2xl font-bold text-gray-800 text-center mb-1">¡Te damos la bienvenida!</h2>
        <p id="auth-subtitulo" class="text-xs text-gray-500 text-center mb-6">Inicia sesión para gestionar tus pedidos y garantías.</p>

        <button type="button" id="btn-google" class="w-full flex items-center justify-center gap-3 bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-semibold py-3 px-4 rounded-xl transition shadow-sm mb-6">
            <svg class="w-5 h-5" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Continuar con Google
        </button>

        <div class="flex items-center my-4">
            <div class="flex-1 border-t border-gray-200"></div>
            <span class="mx-4 text-xs text-gray-400 uppercase tracking-wider font-semibold">o usar correo</span>
            <div class="flex-1 border-t border-gray-200"></div>
        </div>

        <form id="form-auth" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Correo Electrónico</label>
                <input type="email" id="auth-email" placeholder="ejemplo@correo.com" required class="mt-1 block w-full p-3 border rounded-xl text-gray-950 focus:ring-blue-500 shadow-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Contraseña</label>
                <input type="password" id="auth-password" placeholder="••••••" required class="mt-1 block w-full p-3 border rounded-xl text-gray-950 focus:ring-blue-500 shadow-sm">
            </div>
            
            <div id="wrapper-whatsapp-registro" class="hidden">
                <label class="block text-sm font-medium text-amber-600 font-bold">Número de WhatsApp (Obligatorio)</label>
                <input type="tel" id="auth-whatsapp-registro" placeholder="Ej: +593999999999" class="mt-1 block w-full p-3 border border-amber-300 rounded-xl text-gray-950 bg-amber-50 shadow-sm">
            </div>

            <button type="submit" id="btn-auth-submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition shadow-lg">
                Ingresar con Correo
            </button>
        </form>

        <div class="mt-6 text-center text-sm border-t pt-4">
            <button onclick="alternarModoAuth()" id="btn-cambiar-modo" class="text-blue-600 hover:underline font-medium">
                ¿No tienes cuenta? Regístrate aquí
            </button>
        </div>
    </div>

    <div id="modal-whatsapp" class="bg-white p-8 rounded-2xl shadow-2xl max-w-md w-full hidden text-center">
        <h3 class="text-xl font-bold text-gray-900 mb-2">¡Paso Obligatorio!</h3>
        <p class="text-sm text-gray-600 mb-6">Introduce tu WhatsApp para activar tus coberturas de mantenimiento gratuito.</p>
        <form id="form-whatsapp-confirmar" class="space-y-4">
            <input type="tel" id="input-whatsapp-modal" placeholder="Ej: +593999999999" required class="block w-full p-3 border rounded-xl text-center text-lg text-gray-950 font-semibold focus:ring-green-500">
            <button type="submit" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-xl transition shadow-lg">
                Completar Registro
            </button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyB2p4mFewLlKojEAAfMfNi76U9K3HiIiAo",
          authDomain: "ventas-dcc22.firebaseapp.com",
          projectId: "ventas-dcc22",
          storageBucket: "ventas-dcc22.firebasestorage.app",
          messagingSenderId: "789904237680",
          appId: "1:789904237680:web:45b32dd8e211193e1e40b5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        let esModoRegistro = false;
        let datosUsuarioTemporal = null;

        // --- EVALUAR ROL DESDE FIRESTORE BASE DE DATOS ---
        async function evaluarRolYRedireccionar(uid) {
            const docRef = doc(db, "usuarios_registrados", uid);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const datos = docSnap.data();
                if (datos.rol === "admin") {
                    window.location.href = "jadiventas/admin.html"; // Al panel de control interno
                } else {
                    window.location.href = "index.html"; // Al catálogo normal
                }
            } else {
                window.location.href = "index.html";
            }
        }

        // --- CONTROLADOR GENERAL DE REGISTRO E INGRESO ---
        async function procesarUsuario(user, nombreDefecto, whatsappManual = null) {
            const docRef = doc(db, "usuarios_registrados", user.uid);
            const docSnap = await getDoc(docRef);

            if (!docSnap.exists()) {
                if (!whatsappManual) {
                    datosUsuarioTemporal = user;
                    document.getElementById('contenedor-login').classList.add('hidden');
                    document.getElementById('modal-whatsapp').classList.remove('hidden');
                    return;
                }

                // REGISTRO INICIAL POR DEFECTO: SIEMPRE ES ROL CLIENTE
                await setDoc(docRef, {
                    clienteEmail: user.email,
                    nombre: user.displayName || nombreDefecto,
                    whatsapp: whatsappManual,
                    rol: "cliente", // <--- CONTROLADOR DE ROL INICIAL
                    fechaRegistro: new Date().toLocaleDateString(),
                    garantiasYPostventa: { mantenimientoMes3: "Disponible", ajusteCosturasMes4: "Disponible" }
                });
            }
            
            await evaluarRolYRedireccionar(user.uid);
        }

        // Evento Modal WhatsApp
        document.getElementById('form-whatsapp-confirmar').addEventListener('submit', async (e) => {
            e.preventDefault();
            const wa = document.getElementById('input-whatsapp-modal').value.trim();
            if (datosUsuarioTemporal) {
                await procesarUsuario(datosUsuarioTemporal, "Cliente Google", wa);
            }
        });

        // Autenticación Google
        document.getElementById('btn-google').addEventListener('click', async () => {
            try {
                const res = await signInWithPopup(auth, googleProvider);
                await procesarUsuario(res.user, res.user.displayName);
            } catch (err) { alert("Error: " + err.message); }
        });

        // Formulario tradicional
        document.getElementById('form-auth').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value.trim();
            const pass = document.getElementById('auth-password').value;

            try {
                if (esModoRegistro) {
                    const wa = document.getElementById('auth-whatsapp-registro').value.trim();
                    const cred = await createUserWithEmailAndPassword(auth, email, pass);
                    await procesarUsuario(cred.user, "Cliente Correo", wa);
                } else {
                    const cred = await signInWithEmailAndPassword(auth, email, pass);
                    await evaluarRolYRedireccionar(cred.user.uid);
                }
            } catch (err) { alert("Error: " + err.message); }
        });

        window.alternarModoAuth = () => {
            esModoRegistro = !esModoRegistro;
            document.getElementById('auth-titulo').innerText = esModoRegistro ? "Crear Cuenta" : "¡Te damos la bienvenida!";
            document.getElementById('btn-auth-submit').innerText = esModoRegistro ? "Registrarme" : "Ingresar con Correo";
            document.getElementById('wrapper-whatsapp-registro').classList.toggle('hidden', !esModoRegistro);
            document.getElementById('auth-whatsapp-registro').required = esModoRegistro;
            document.getElementById('btn-cambiar-modo').innerText = esModoRegistro ? "¿Ya tienes cuenta? Inicia sesión" : "¿No tienes cuenta? Regístrate aquí";
        };
    </script>
</body>
</html>
