<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Calzado</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <nav class="bg-gray-800 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wider text-yellow-500">PANEL ADMINISTRATIVO</h1>
            <a href="index.html" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded text-sm transition">Ver Catálogo</a>
        </div>
    </nav>

    <main class="container mx-auto p-4 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <section class="bg-white p-6 rounded-lg shadow-md h-fit">
            <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">Agregar Nuevo Calzado</h2>
            <form id="form-producto" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Nombre del Modelo</label>
                    <input type="text" id="nombre" required class="mt-1 block w-full p-2 border rounded-md shadow-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Precio ($)</label>
                    <input type="number" id="precio" step="0.01" required class="mt-1 block w-full p-2 border rounded-md shadow-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">URL de Imagen (Cloudinary)</label>
                    <input type="url" id="imagen" placeholder="https://res.cloudinary.com/..." required class="mt-1 block w-full p-2 border rounded-md shadow-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Descripción</label>
                    <textarea id="descripcion" rows="3" class="mt-1 block w-full p-2 border rounded-md shadow-sm"></textarea>
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition">
                    Guardar Calzado
                </button>
            </form>
        </section>

        <section class="lg:col-span-2 bg-white p-6 rounded-lg shadow-md overflow-x-auto">
            <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">Modelos en Base de Datos</h2>
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Producto</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Precio</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-productos" class="bg-white divide-y divide-gray-200">
                    </tbody>
            </table>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        // Tus credenciales oficiales aplicadas
        const firebaseConfig = {
          apiKey: "AIzaSyB2p4mFewLlKojEAAfMfNi76U9K3HiIiAo",
          authDomain: "ventas-dcc22.firebaseapp.com",
          projectId: "ventas-dcc22",
          storageBucket: "ventas-dcc22.firebasestorage.app",
          messagingSenderId: "789904237680",
          appId: "1:789904237680:web:45b32dd8e211193e1e40b5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const formProducto = document.getElementById('form-producto');
        const tablaProductos = document.getElementById('tabla-productos');

        onSnapshot(collection(db, "calzado"), (snapshot) => {
            tablaProductos.innerHTML = '';
            if(snapshot.empty) {
                tablaProductos.innerHTML = '<tr><td colspan="3" class="p-4 text-sm text-gray-500 text-center">No hay productos en Firestore.</td></tr>';
                return;
            }
            snapshot.forEach((doc) => {
                const prod = doc.data();
                const id = doc.id;
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50";
                tr.innerHTML = `
                    <td class="px-4 py-4 whitespace-nowrap">
                        <div class="flex items-center">
                            <img class="h-10 w-10 rounded object-cover mr-3 border" src="${prod.imagen}" alt="">
                            <div class="text-sm font-medium text-gray-900">${prod.nombre}</div>
                        </div>
                    </td>
                    <td class="px-4 py-4 whitespace-nowrap text-sm text-gray-900 font-bold">$${parseFloat(prod.precio).toFixed(2)}</td>
                    <td class="px-4 py-4 whitespace-nowrap text-sm font-medium">
                        <button class="text-red-600 hover:text-red-900 font-semibold btn-eliminar" data-id="${id}">Eliminar</button>
                    </td>
                `;
                tr.querySelector('.btn-eliminar').addEventListener('click', () => eliminarProducto(id));
                tablaProductos.appendChild(tr);
            });
        });

        formProducto.addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await addDoc(collection(db, "calzado"), {
                    nombre: document.getElementById('nombre').value,
                    precio: parseFloat(document.getElementById('precio').value),
                    imagen: document.getElementById('imagen').value, // URL de Cloudinary
                    descripcion: document.getElementById('descripcion').value
                });
                formProducto.reset();
                alert("¡Calzado guardado exitosamente!");
            } catch (error) {
                console.error("Error al guardar:", error);
            }
        });

        async function eliminarProducto(id) {
            if(confirm("¿Deseas eliminar este calzado?")) {
                await deleteDoc(doc(db, "calzado", id));
            }
        }
    </script>
</body>
</html>
